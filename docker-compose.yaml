services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: platform_app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@symfony-db:3306/${MYSQL_DATABASE}?serverVersion=8.0.32&charset=utf8mb4"
    depends_on:
      - symfony-db
    networks:
      - platform-network

  symfony-db:
    image: mysql:8.0
    container_name: symfony-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3310:3306"
    volumes:

      - platform-db-data:/var/lib/mysql
    networks:
      - platform-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: platform_phpmyadmin
    environment:
      PMA_HOST: symfony-db
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      - symfony-db
    networks:
      - platform-network

volumes:
  platform-db-data:

networks:
  platform-network:
